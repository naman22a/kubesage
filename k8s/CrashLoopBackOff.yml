apiVersion: apps/v1
kind: Deployment
metadata:
    name: crashloop-app-deployment
    namespace: default
spec:
    replicas: 1
    selector:
        matchLabels:
            app: crashloop-app
    template:
        metadata:
            labels:
                app: crashloop-app
        spec:
            restartPolicy: Always
            containers:
                - name: app
                  image: python:3.11-slim
                  command:
                      - python
                      - -c
                      - |
                          import time
                          print("Starting app...")
                          time.sleep(3)
                          raise Exception("Database connection failed")
